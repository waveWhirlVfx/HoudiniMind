name: Feature request
description: Propose a new capability for HoudiniMind.
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is painful today? Be concrete.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the ideal UX look like? A prompt, a panel control, a CLI flag?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - agent loop
        - tools
        - RAG
        - UI / panel
        - MCP bridge
        - docs
        - packaging / install
